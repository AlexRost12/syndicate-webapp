<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Syndicate Cabinet</title>
    <!-- ✅ ОБЯЗАТЕЛЬНЫЙ СКРИПТ TELEGRAM -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --text: #f8fafc;
            --blue: #3b82f6; --green: #22c55e;
        }
        body {
            background: var(--bg); color: var(--text);
            font-family: -apple-system, sans-serif;
            margin: 0; padding: 20px;
        }
        .card {
            background: var(--card); border-radius: 20px;
            padding: 20px; margin-bottom: 15px;
        }
        .balance { font-size: 48px; font-weight: 800; color: var(--green); text-align: center; }
        .btn {
            width: 100%; padding: 15px; margin: 10px 0;
            border: none; border-radius: 12px;
            background: var(--blue); color: white;
            font-weight: 600; font-size: 16px; cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>👋 Личный кабинет</h2>
        <p id="username">Загрузка...</p>
        <div class="balance" id="balance">$0.00</div>
        <p style="text-align: center; color: #94a3b8;">Курс: 100 монет = $0.010</p>
    </div>
    
    <button class="btn" onclick="tg.showAlert('Функция в разработке!')">💰 Сдать монеты</button>
    <button class="btn" onclick="tg.showAlert('Мин. вывод: $0.80')">💳 Вывести</button>
    <button class="btn" onclick="copyRef()">🤝 Пригласить друга</button>

    <script>
        // ✅ ИНИЦИАЛИЗАЦИЯ TELEGRAM WEB APP
        const tg = window.Telegram.WebApp;
        tg.expand(); // Раскрыть на весь экран
        tg.enableClosingConfirmation(); // Подтверждение закрытия

        // Получаем данные пользователя
        const user = tg.initDataUnsafe?.user;
        if (user) {
            const name = user.username ? `@${user.username}` : user.first_name;
            document.getElementById('username').textContent = `Игрок: ${name}`;
        }

        // Копирование реф-ссылки
        function copyRef() {
            const link = `https://t.me/Syndicate_10k_bot?start=${user?.id || ''}`;
            navigator.clipboard.writeText(link);
            tg.showAlert('📋 Ссылка скопирована!');
        }

        // Отправка данных боту (пример)
        function sendData(action, data) {
            tg.sendData(JSON.stringify({ action, ...data }));
        }
    </script>
</body>
</html>
